  autor_epigrafe: "AYRTON SENNA"

  resumo: "As espécies de Culicidae (Diptera) presentes nas regiões urbanas têm seu desenvolvimento favorecido pela disponibilidade de criadouros associados à urbanização e à sua crescente expansão. São insetos holometábolos com enorme plasticidade genética e valência ecológica, nos quais muitas espécies dependem da realização de hematofagia para produção de ovos. No ambiente urbano, muitos desses culicídeos tem grande relevância médica e entomológica pela capacidade de veicular patógenos em humanos e animais. Diante deste cenário, o presente trabalho tem por objetivo realizar ações de detecção precoce e monitoramento de vetores e arboviroses (DENV, CHIKV e ZIKV) no município de Sertanópolis, norte do Paraná. Para tanto, 50 armadilhas tipo Ovitrampas georreferenciadas foram analisadas a cada duas semanas, e foi realizada a coletas de Culicidae (Diptera) adultos com potencial vetorial utilizando aspirador de Nasci adaptados, para verificar presença viral. A flutuação populacional obtida ao longo do período amostrado foi divulgada mensalmente, junto a prefeitura e equipe de endemias do município de Sertanópolis. Espera-se, por meio deste trabalho, contribuir com a atividade de monitoramento e controle dos agentes de endemias do município de Sertanópolis, trazendo diferentes dados e ações de integração com educação ambiental, auxiliando na execução das Diretrizes Nacionais para Prevenção e Controle das Arboviroses Urbanas."

  abstract: "The development of Culicidae (Diptera) species in urban areas is favored by the availability of breeding sites associated with urbanization and its continuous expansion. These are holometabolous insects with significant genetic plasticity and ecological valence, with many species relying on hematophagy for egg production. In the urban environment, many of these culicids are of great medical and entomological relevance due to their capacity to transmit pathogens to humans and animals. Given this scenario, the present study aims to carry out the early detection and monitoring of vectors and arboviruses (DENV, CHIKV, and ZIKV) in the municipality of Sertanópolis, northern Paraná. To this end, 50 georeferenced ovitraps were analyzed biweekly, and adult Culicidae (Diptera) with vector potential were collected using adapted Nasci aspirators to verify viral presence. The population fluctuation observed during the sampling period was reported monthly to the city hall and the endemic diseases control team of Sertanópolis. Through this study, we expect to contribute to the monitoring and control activities of local health agents in Sertanópolis by providing diverse data and integrating actions with environmental education, thereby assisting in the implementation of the National Guidelines for the Prevention and Control of Urban Arboviruses."
